services:
  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  # API 服务（默认启动）
  api:
    build: .
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      - RAG_KB_CONFIG=/app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    ports:
      - "8081:8081"
    command: rag-server

volumes:
  qdrant_data: