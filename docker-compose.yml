services:
  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage

  # API 服务（默认启动）
  rag-api:
    build: .
    depends_on:
      qdrant:
        condition: service_started
    container_name: rag-api
    environment:
      - RAG_KB_CONFIG=/app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    ports:
      - "12007:12007"
    command: rag-server
